server:
  protocol: "grpc"
  port: 19190
  read_timeout: 10s
  write_timeout: 10s
  api_key: ""
  rate_limit_rps: 100

database:
  snapshot_path: "./data/snapshot.json"
  wal_path: "./data/wal.log"
  snapshot_every: 25
  vector_store: "memory"
  vector_path: "./data/vectors"
  cache_enabled: false
  cache_max_bytes: 8388608
  cache_max_items: 1024
  cache_ttl: "15m"

limits:
  max_body_bytes: 1048576
  max_vector_dim: 4096
  max_k: 100

search:
  mode: "exact"
  ann_profile: "balanced"
  ann_m: 16
  ann_ef_construction: 64
  ann_ef_search: 64
  ann_eval_sample_rate: 0

grpc:
  enabled: true
  port: 19191

security:
  profile: "development"
  auth:
    enabled: false
    api_key: ""
    grpc_enabled: false
  transport:
    tls_enabled: false
    cert_file: ""
    key_file: ""
  proxy:
    trust_forwarded_for: false
    trusted_proxies: []
  storage:
    strict_file_permissions: false
    dir_mode: "0755"
    file_mode: "0644"
