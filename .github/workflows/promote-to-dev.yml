name: Promote Feature To Dev

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  open-dev-pr:
    name: Open PR To Dev
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'feature/')
    runs-on: ubuntu-latest

    steps:
      - name: Create or update PR to dev
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const head = context.payload.workflow_run.head_branch;
            const base = "dev";

            const { owner, repo } = context.repo;
            const prTitle = `Promote ${head} to ${base}`;
            const prBody = [
              "## Automated promotion",
              "",
              `Source branch: \`${head}\``,
              `Target branch: \`${base}\``,
              "",
              "This draft PR was opened automatically after the CI workflow succeeded on the source branch."
            ].join("\n");

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base
            });

            if (existing.length > 0) {
              core.info(`PR already exists: #${existing[0].number}`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existing[0].number,
                title: prTitle,
                body: prBody,
                state: "open"
              });
              return;
            }

            await github.rest.pulls.create({
              owner,
              repo,
              head,
              base,
              title: prTitle,
              body: prBody,
              draft: true
            });
