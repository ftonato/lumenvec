name: Publish Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.value }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
          fi

          if [[ ! "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Latest tag $latest_tag does not match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          version="v${major}.${minor}.$((patch + 1))"

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "Tag $version already exists" >&2
            exit 1
          fi

  build-assets:
    name: Build Release Assets
    runs-on: ubuntu-latest
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build transport bundles
        shell: bash
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}" GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" DIST_DIR="dist/release" bash scripts/package-release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/release/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-assets]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bundled assets
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: release-*
          merge-multiple: true

      - name: Extract release notes for current tag
        shell: bash
        run: |
          tag="${{ needs.prepare-release.outputs.version }}"
          previous="${{ needs.prepare-release.outputs.previous_tag }}"
          {
            echo "## ${tag}"
            echo
            echo "Automated release from \`${previous}\` to \`${tag}\`."
            echo
            echo "### Commits"
            git log --no-merges --pretty='- %s (%h)' "${previous}..HEAD"
          } > dist/release/release-notes.md

          if ! grep -q '^-' dist/release/release-notes.md; then
            echo "- No user-facing commits since ${previous}" >> dist/release/release-notes.md
          fi

      - name: Create git tag
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "LumenVec $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          name: ${{ needs.prepare-release.outputs.version }}
          body_path: dist/release/release-notes.md
          files: dist/release/*
