name: Publish Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: read

jobs:
  prepare-release:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.value }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      bump: ${{ steps.version.outputs.bump }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: version
        shell: bash
        run: |
          bump="patch"
          pr_json="$(gh pr list --state merged --base main --search "${GITHUB_SHA}" --json number,mergeCommit,labels --limit 10)"
          pr_number="$(echo "$pr_json" | jq -r '.[] | select(.mergeCommit.oid == env.GITHUB_SHA) | .number' | head -n 1)"

          if [[ -n "$pr_number" ]]; then
            labels="$(echo "$pr_json" | jq -r '.[] | select(.number == '"$pr_number"') | .labels[].name')"
            if echo "$labels" | grep -qx 'release:major'; then
              bump="major"
            elif echo "$labels" | grep -qx 'release:minor'; then
              bump="minor"
            fi
          fi

          eval "$(bash scripts/compute-next-version.sh "$bump")"
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "Tag $version already exists" >&2
            exit 1
          fi

  build-assets:
    name: Build Release Assets
    runs-on: ubuntu-latest
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build transport bundles
        shell: bash
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}" GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" DIST_DIR="dist/release" bash scripts/package-release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/release/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-assets]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bundled assets
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: release-*
          merge-multiple: true

      - name: Extract release notes for current tag
        shell: bash
        run: |
          tag="${{ needs.prepare-release.outputs.version }}"
          previous="${{ needs.prepare-release.outputs.previous_tag }}"
          bash scripts/generate-release-notes.sh "$tag" "$previous" > dist/release/release-notes.md

      - name: Create git tag
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "LumenVec $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          name: ${{ needs.prepare-release.outputs.version }}
          body_path: dist/release/release-notes.md
          files: dist/release/*
