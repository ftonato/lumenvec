name: CI

on:
  push:
    branches:
      - "main"
      - "master"
      - "dev"
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
  pull_request:
    branches:
      - "main"
      - "master"
      - "dev"

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Test and Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Print Go version
        run: go version

      - name: Verify modules
        run: go mod tidy && git diff --exit-code

      - name: Run tests
        run: go test ./...

      - name: Run race tests on critical packages
        run: go test -race ./internal/core ./internal/api ./pkg/client

      - name: Run vet
        run: go vet ./...

      - name: Enforce coverage threshold
        run: go run ./tools/checkcoverage

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m
