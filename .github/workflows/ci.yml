name: CI

on:
  push:
    branches:
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
  pull_request:
    branches:
      - "main"
      - "dev"

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Test and Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Print Go version
        run: go version

      - name: Verify modules
        run: go mod tidy && git diff --exit-code

      - name: Run tests
        run: go test ./...

      - name: Run race tests on critical packages
        run: go test -race ./internal/core ./internal/api ./pkg/client

      - name: Run vet
        run: go vet ./...

      - name: Enforce coverage threshold
        run: go run ./tools/checkcoverage

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

  container-security:
    name: Container Security
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: lumenvec:ci

      - name: Run Trivy image scan
        run: >
          docker run --rm
          -v /var/run/docker.sock:/var/run/docker.sock
          aquasec/trivy:0.68.2
          image
          --format table
          --exit-code 1
          --ignore-unfixed
          --severity CRITICAL,HIGH
          lumenvec:ci
